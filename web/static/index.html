<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APEX | Interactive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">APEX<span>_</span></div>
        <div class="regime-pill" id="regimeBadge">Loading Regime...</div>
    </div>
    
    <div class="container">
        <!-- Left: Recommendations Table -->
        <div class="main-content">
            <div class="strategy-tabs">
                <button class="tab-btn active" id="btnMain" onclick="switchStrategy('main')">APEX CORE (Large/Mid Caps)</button>
                <button class="tab-btn" id="btnSmall" onclick="switchStrategy('smallcap')">ALPHA MODULE (Small Caps)</button>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-weight: 300; color: #94a3b8; letter-spacing: 1px; margin: 0;" id="tableTitle">Top 100 Live Market Scanner</h2>
                <div style="display: flex; gap: 20px; align-items: center;">
                    <input type="text" id="searchInput" placeholder="Search Ticker..." onkeyup="filterTable()" style="padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.5); color: white; outline: none; font-family: 'Inter', sans-serif; width: 200px; transition: border-color 0.2s;" onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
                    <div id="scanSummary" style="font-size: 13px; font-weight: 600;"></div>
                    <div id="lastUpdated" style="font-size: 12px; color: var(--accent-blue);"></div>
                </div>
            </div>
            
            <div class="table-container">
                <table id="dataTable">
                    <thead id="tableHead">
                        <tr>
                            <th>TICKER</th>
                            <th>CURRENT PRICE</th>
                            <th>PREDICTED TRAJECTORY</th>
                            <th>SCORE</th>
                            <th>SIGNAL</th>
                            <th>FUNDAMENTALS</th>
                            <th>SL / TARGET</th>
                            <th>POSITION</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Right: Portfolio Tracker -->
        <div class="sidebar">
            <div class="portfolio-card">
                <h2 style="margin-top: 0;">Portfolio Tracker</h2>
                <p style="font-size: 12px; color: #94a3b8; margin-bottom: 20px;">Manage your active deployed capital.</p>
                
                <div class="add-form">
                    <input type="text" id="pTicker" placeholder="Ticker (e.g. RELIANCE)">
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="pPrice" placeholder="Buy Price" style="flex: 1;">
                        <input type="number" id="pQty" placeholder="Quantity" style="flex: 1;">
                    </div>
                    <select id="pTerm">
                        <option value="Long Term">Long Term</option>
                        <option value="Medium Term">Medium Term</option>
                        <option value="Short Term">Short Term</option>
                    </select>
                    <button onclick="addPosition()">Add Position</button>
                </div>
                
                <h3 style="font-size: 14px; margin-top: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Open Positions</h3>
                <div class="portfolio-list" id="portfolioList">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
